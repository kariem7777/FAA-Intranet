<html lang="en">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAA Intranet</title>
</head>

<body>
  <div id="root">
    <div
      style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #6d6b62; background: linear-gradient(135deg, #908e81 0%, #6d6b62 60%, #6d6b62 100%);">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 16px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#e5ddc8"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;">
          <path d="M21 12a9 9 0 1 1-6.219-8.56" />
        </svg>
      </div>
      <style>
        @keyframes spin {
          from {
            transform: rotate(0deg);
          }

          to {
            transform: rotate(360deg);
          }
        }

        body {
          margin: 0;
          padding: 0;
        }
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
